# =============================================================================
# RPG OT — Stack Portainer (Docker Swarm + Traefik)
# Domínio: rpgot.muhbianco.com.br
# Rede: chatbot-net (mesma do Traefik)
# Imagem: muhrilobianco/rpg_ot:latest (Docker Hub)
# DB: MariaDB do HOST (database rpg_ot)
#
# Fluxo:
# 1. ./build.sh prod   (build + push da imagem)
# 2. Definir GEMINI_API_KEY no stack / secrets
# 3. Portainer → Stacks → Add/Update stack com este YAML → Deploy
# =============================================================================

version: "3.8"

services:
  rpg_ot:
    image: muhrilobianco/rpg_ot:latest
    environment:
      NODE_ENV: production
      PORT: "3000"
      CORS_ORIGIN: https://rpgot.muhbianco.com.br
      DB_HOST: host.docker.internal
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "G!7mXy@9#bQz$$2NpVw&K"
      DB_NAME: rpg_ot
      GEMINI_API_KEY: ""
      GEMINI_MODEL: gemini-2.5-pro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatbot-net
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=chatbot-net
        - traefik.http.routers.rpg_ot.rule=Host(`rpgot.muhbianco.com.br`)
        - traefik.http.routers.rpg_ot.entrypoints=websecure
        - traefik.http.routers.rpg_ot.tls.certresolver=letsencryptresolver
        - traefik.http.routers.rpg_ot.priority=1
        - traefik.http.routers.rpg_ot.service=rpg_ot
        - traefik.http.routers.rpg_ot.middlewares=rpg_ot_headers
        - traefik.http.services.rpg_ot.loadbalancer.server.port=3000
        - traefik.http.services.rpg_ot.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.rpg_ot_headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.rpg_ot_headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.rpg_ot_headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.rpg_ot_headers.headers.browserXssFilter=true
        - traefik.http.middlewares.rpg_ot_headers.headers.referrerPolicy=no-referrer
        - traefik.http.middlewares.rpg_ot_headers.headers.customFrameOptionsValue=DENY
        - traefik.http.middlewares.rpg_ot_headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()

networks:
  chatbot-net:
    external: true
    name: chatbot-net
